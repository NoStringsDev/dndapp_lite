<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>The Parralleers — Sessions</title>
  <meta name="description" content="Session scheduling for The Parralleers D&D group."/>
  <meta name="theme-color" content="#0f0d0b"/>
  <meta name="apple-mobile-web-app-title" content="Sessions"/>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png"/>
  <script>
  (function(){
    var m = {
      name: 'The Parralleers — Sessions',
      short_name: 'Sessions',
      description: 'Party availability and confirmed sessions',
      start_url: './',
      display: 'standalone',
      background_color: '#0f0d0b',
      theme_color: '#0f0d0b',
      icons: [
        { src: './icon-192.png', sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
        { src: './icon-512.png', sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
        { src: './favicon.svg', sizes: 'any', type: 'image/svg+xml', purpose: 'any' }
      ]
    };
    var link = document.createElement('link');
    link.rel = 'manifest';
    link.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(m));
    document.head.appendChild(link);
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
  :root {
    --bg:         #0f0d0b;
    --bg-card:    #171410;
    --bg-raised:  #1d1916;
    --border:     #272018;
    --border-md:  #302820;
    --text:       #e2dbd0;
    --text-dim:   #a09080;
    --text-mute:  #5a5048;
    --accent-gh:  #5a8a5e;
    --accent-arc: #7a6ec0;
    --font-serif:   'Lora', Georgia, serif;
    --font-display: 'Cinzel', serif;
    --font-sans:    'Inter', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  .screen {
    max-width: 420px;
    margin: 0 auto;
    padding: 0;
  }
  .hidden { display: none !important; }
  label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-mute); margin-bottom: 6px; }
  input[type="password"], input[type="text"], input[type="time"], select, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border-md);
    background: var(--bg-raised);
    color: var(--text);
    font-size: 0.95rem;
    font-family: var(--font-sans);
  }
  textarea { min-height: 56px; resize: vertical; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 16px; border-radius: 8px; border: none;
    font-weight: 600; font-size: 0.88rem; cursor: pointer;
    background: var(--bg-raised); color: var(--text);
    font-family: var(--font-sans); min-height: 44px;
  }
  .btn-primary { background: #2e3c2a; color: #94cc94; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border-md); color: var(--text-dim); }
  .row-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; align-items: center; }

  .gate-page { background: var(--bg); padding-bottom: 48px; }
  .gate-welcome { padding: 28px 20px 20px; text-align: center; }
  .gate-welcome-title {
    font-family: var(--font-serif);
    font-size: 23px; font-weight: 600;
    color: var(--text); letter-spacing: 0.01em;
  }
  .campaign-cards { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
  .campaign-card {
    border-radius: 14px; overflow: hidden;
    position: relative; border: 1px solid var(--border-md);
  }
  .campaign-card.gh { min-height: 200px; display: flex; flex-direction: column; justify-content: flex-end; }
  .campaign-card.arc { min-height: 130px; display: flex; flex-direction: column; justify-content: flex-end; }
  .campaign-card-bg { position: absolute; inset: 0; }
  .campaign-card-bg img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block;
  }
  .campaign-card-filter {
    position: absolute; inset: 0;
    background: rgba(20,38,22,0.18);
    mix-blend-mode: multiply;
  }
  .campaign-card.arc .campaign-card-filter { background: rgba(18,14,40,0.20); }
  .campaign-card-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.70) 100%);
  }
  .campaign-card.arc .campaign-card-scrim {
    background: linear-gradient(to bottom, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.72) 100%);
  }
  .campaign-card-content {
    position: relative; z-index: 2;
    padding: 14px 16px 16px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .campaign-card-tag {
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; font-weight: 600; margin-bottom: 5px;
  }
  .campaign-card-tag.gh { color: rgba(190,240,195,0.90); }
  .campaign-card-tag.arc { color: rgba(210,195,255,0.90); }
  .campaign-card-name {
    font-family: var(--font-display);
    font-size: 19px; font-weight: 700;
    letter-spacing: 0.05em; line-height: 1.15;
    text-shadow: 0 1px 10px rgba(0,0,0,0.6);
  }
  .campaign-card.gh .campaign-card-name { color: #e8f8e8; }
  .campaign-card.arc .campaign-card-name { color: #e8e0ff; }
  .campaign-sessions { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .campaign-session-item { font-size: 11px; letter-spacing: 0.02em; line-height: 1.4; }
  .campaign-card.gh .campaign-session-item { color: rgba(220,245,225,0.88); }
  .campaign-card.arc .campaign-session-item { color: rgba(220,210,255,0.88); }
  .gate-player-section { padding: 24px 16px 0; }
  .gate-register-label {
    font-family: var(--font-serif);
    font-size: 17px; font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: 0.01em;
    text-align: center;
  }
  .player-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 20px;
  }
  .player-choice {
    background: var(--bg-card);
    border: 1px solid var(--border-md);
    border-radius: 11px;
    padding: 16px 12px;
    text-align: center; cursor: pointer;
    transition: border-color 120ms, background 120ms;
    min-height: 56px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: 16px; font-weight: 600;
    color: var(--text-dim); letter-spacing: 0.02em;
  }
  .player-choice:hover { border-color: #3a3020; background: var(--bg-raised); }
  .player-choice.on {
    border-color: #a07840;
    background: #1e1810;
    color: #d4a464;
    font-weight: 600;
  }
  .continue-btn {
    width: 100%; padding: 16px;
    border-radius: 11px; border: none;
    background: #3a2c18; color: #d4a464;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 600;
    letter-spacing: 0.07em; cursor: pointer;
    min-height: 52px; transition: background 120ms;
  }
  .continue-btn:hover { background: #463420; }

  .app-header {
    padding: 15px 16px 13px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }
  .app-title {
    font-family: var(--font-serif);
    font-size: 18px; font-weight: 600; color: var(--text);
  }
  .app-sub { font-size: 11px; color: var(--text-mute); margin-top: 2px; }
  .app-sub strong { font-weight: 600; color: var(--text-dim); }
  .signout-btn {
    font-size: 11px; color: var(--text-mute);
    background: transparent; border: 1px solid var(--border-md);
    border-radius: 7px; padding: 8px 12px; cursor: pointer;
    min-height: 36px; font-family: var(--font-sans);
  }
  .content { padding: 14px 16px 80px; }
  .section-label {
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--text-mute);
    margin-bottom: 10px; font-weight: 500;
  }
  .confirmed-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .session-card {
    border-radius: 13px; overflow: hidden;
    position: relative; min-height: 100px;
    border: 1px solid var(--border-md); cursor: pointer;
  }
  .session-card-bg { position: absolute; inset: 0; }
  .session-card-bg img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center 40%; display: block;
  }
  .session-card-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(to right, rgba(10,8,6,0.90) 0%, rgba(10,8,6,0.65) 55%, rgba(10,8,6,0.28) 100%);
  }
  .session-card.arc .session-card-scrim {
    background: linear-gradient(to right, rgba(6,5,16,0.92) 0%, rgba(6,5,16,0.68) 55%, rgba(6,5,16,0.28) 100%);
  }
  .session-card-content { position: relative; z-index: 2; padding: 13px 14px; }
  .session-campaign-tag {
    font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 4px; font-weight: 600;
  }
  .session-campaign-tag.gh { color: #90d898; }
  .session-campaign-tag.arc { color: #b8a8ff; }
  .session-date-large {
    font-family: var(--font-serif);
    font-size: 17px; font-weight: 600;
    color: #f0ece4; letter-spacing: 0.01em;
  }
  .session-time-text { font-size: 11px; color: rgba(200,190,175,0.85); margin-top: 3px; }
  .session-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .chip {
    font-size: 10px; padding: 3px 9px; border-radius: 999px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(225,218,205,0.95);
  }
  .chip.arc {
    background: rgba(160,140,255,0.13);
    border-color: rgba(160,140,255,0.28);
    color: #c8b8ff;
  }
  .cal-sync-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border-md);
    border-radius: 13px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .cal-sync-toggle {
    width: 100%;
    border: none;
    background: transparent;
    color: inherit;
    font-family: var(--font-sans);
    padding: 12px 14px;
    min-height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    text-align: left;
  }
  .cal-sync-title { font-size: 13px; font-weight: 600; color: #c0b8ac; }
  .cal-sync-hint { font-size: 11px; color: var(--text-mute); margin-top: 2px; line-height: 1.45; }
  .cal-sync-chevron {
    font-size: 12px;
    color: var(--text-mute);
    transition: transform 180ms ease;
  }
  .cal-sync-wrap.open .cal-sync-chevron { transform: rotate(180deg); }
  .cal-sync-panel {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 14px 14px;
  }
  .cal-sync-wrap.open .cal-sync-panel { display: block; }
  .cal-sync-note { font-size: 11px; color: var(--text-mute); line-height: 1.5; margin-bottom: 10px; }
  .cal-sync-primary { margin-bottom: 8px; }
  .cal-sync-primary .small-btn { width: 100%; }
  .cal-sync-advanced summary {
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    margin: 4px 0 8px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .cal-feed-url { font-size: 10px; color: #4a7050; word-break: break-all; margin-bottom: 10px; }
  .cal-feed-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .small-btn {
    font-size: 11px; padding: 8px 13px;
    border-radius: 7px; border: 1px solid var(--border-md);
    background: var(--bg-raised); color: var(--text-dim);
    cursor: pointer; font-family: var(--font-sans); min-height: 36px;
  }
  .month-nav {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 12px;
  }
  .month-nav-title {
    font-family: var(--font-serif);
    font-size: 17px; font-weight: 600; color: #c0b8ac;
    min-width: 150px; text-align: center;
  }
  .month-nav-btn {
    background: var(--bg-raised);
    border: 1px solid var(--border-md);
    border-radius: 7px; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-dim); font-size: 17px;
    font-family: var(--font-sans);
  }
  .filter-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .filter-toggle {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
  }
  .toggle-track {
    width: 36px; height: 20px; border-radius: 999px;
    background: var(--bg-raised);
    border: 1px solid var(--border-md);
    position: relative; flex-shrink: 0;
    transition: background 200ms, border-color 200ms;
  }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-mute);
    transition: transform 200ms, background 200ms;
  }
  .filter-toggle.on .toggle-track { background: #1e3020; border-color: #3a6040; }
  .filter-toggle.on .toggle-thumb { transform: translateX(16px); background: #70b878; }
  .filter-toggle-label { font-size: 12px; color: var(--text-dim); }
  .divider { height: 1px; background: var(--border); margin-bottom: 2px; }

  .day-empty { font-size: 12px; color: var(--text-mute); padding: 16px 4px; }
  .day-row { border-bottom: 1px solid var(--border); overflow: hidden; }
  .day-row:last-child { border-bottom: none; }
  .day-collapsed {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 4px;
    min-height: 68px;
  }
  .day-row.today-row .day-collapsed {
    background: rgba(60,80,55,0.07);
    border-radius: 9px;
  }
  .day-row.past-row {
    opacity: 0.58;
  }
  .day-row.past-row .day-weekday,
  .day-row.past-row .day-month-label { color: #6d645b; }
  .day-row.past-row .day-num { color: #8e8375; }
  .day-row.past-row .vbtn-sm {
    color: #7d7368;
    border-color: #28221b;
    background: #14110e;
  }
  .day-row.past-row .vbtn-sm:hover {
    border-color: #342c24;
    color: #938779;
  }
  .day-row.past-row .pip { background: #3a3028; }
  .day-row.past-row .full-table-badge {
    color: #6f8f72;
    background: #121b12;
    border-color: #263a28;
  }
  .day-row.past-row .chevron,
  .day-row.past-row .exp-party-label { color: #72685f; }
  .day-row.past-row .pp.e {
    background: #171410;
    border-color: #28221b;
    color: #776d62;
  }
  .day-weekday { font-size: 9px; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; }
  .day-num {
    font-family: var(--font-serif);
    font-size: 26px; font-weight: 600;
    color: #c8c0b4; line-height: 1; letter-spacing: -0.02em;
  }
  .day-month-label { font-size: 10px; color: var(--text-mute); }
  .day-row.today-row .day-num { color: #dff0e0; }
  .vote-btns-collapsed {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
  }
  .vbtn-sm {
    height: 44px;
    border-radius: 8px;
    border: 1px solid var(--border-md);
    background: var(--bg-card);
    color: var(--text-mute);
    font-size: 11px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em;
    transition: all 120ms;
    font-family: var(--font-sans);
    touch-action: manipulation;
  }
  .vbtn-sm:hover { border-color: #3a3028; color: var(--text-dim); }
  .vbtn-sm.yes.on  { background: #182a1c; border-color: #3a7048; color: #80c088; }
  .vbtn-sm.maybe.on { background: #221e0c; border-color: #6a5818; color: #c8a030; }
  .vbtn-sm.no.on   { background: #221414; border-color: #6a3030; color: #c07070; }
  .day-expand-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    padding: 8px 6px 8px 4px;
    cursor: pointer;
    min-width: 48px; min-height: 52px;
    justify-content: center;
    border-radius: 8px;
    transition: background 100ms;
    touch-action: manipulation;
  }
  .day-expand-col:hover { background: rgba(255,255,255,0.04); }
  .pips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pip {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border-md);
    transition: background 150ms;
  }
  .pip.y { background: #4a8a5a; }
  .pip.m { background: #8a7030; }
  .pip.n { background: #7a4444; }
  .full-table-badge {
    font-size: 9px; letter-spacing: 0.10em;
    text-transform: uppercase; color: #7ab880;
    background: #182818; border: 1px solid #2e5030;
    border-radius: 999px; padding: 3px 7px;
    white-space: nowrap; display: inline-block;
    text-align: center; line-height: 1.4;
  }
  .chevron {
    font-size: 11px; color: var(--text-mute);
    transition: transform 200ms, color 200ms;
    line-height: 1;
  }
  .day-row.open .chevron { transform: rotate(180deg); color: var(--text-dim); }
  .day-expanded {
    display: none;
    padding: 0 4px 14px 4px;
  }
  .day-row.open .day-expanded { display: block; }
  .exp-party-label {
    font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-mute);
    margin-bottom: 8px; font-weight: 500;
  }
  .party-pills-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .pp {
    font-size: 11px; padding: 4px 10px;
    border-radius: 999px; border: 1px solid; letter-spacing: 0.02em;
  }
  .pp.y  { background: #16201a; border-color: #2e4834; color: #78b880; }
  .pp.m  { background: #1e1a0c; border-color: #403810; color: #b89838; }
  .pp.n  { background: #1e1414; border-color: #402828; color: #b07070; }
  .pp.e  { background: var(--bg-raised); border-color: var(--border-md); color: var(--text-mute); }
  .book-btn {
    width: 100%; padding: 15px;
    border-radius: 10px; border: none;
    background: #2e3c2a; color: #94cc94;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.07em; cursor: pointer;
    font-family: var(--font-sans); min-height: 52px;
    touch-action: manipulation;
    transition: background 120ms;
  }
  .book-btn:hover { background: #364630; }
  .confirmed-badge {
    width: 100%; padding: 12px;
    border-radius: 10px;
    border: 1px solid #3a4830; background: #161e14;
    color: #6aaa68; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    text-align: center; font-weight: 600;
  }
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 50; padding: 12px;
  }
  .sheet-overlay.sheet-from-top {
    align-items: flex-start;
    padding-top: max(12px, env(safe-area-inset-top, 0px));
    padding-bottom: 12px;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    width: 100%; max-width: 480px; max-height: 90dvh; overflow: auto;
    background: var(--bg-card);
    border: 1px solid var(--border-md);
    border-radius: 14px 14px 0 0;
    padding: 20px 16px;
  }
  .sheet-from-top .sheet {
    border-radius: 0 0 var(--radius) var(--radius);
    max-height: min(90dvh, calc(100dvh - 24px));
  }
  .det-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; align-items: center; }
  .sheet h3 { margin: 0 0 14px; font-family: var(--font-serif); font-size: 17px; font-weight: 600; color: var(--text); }
  .field { margin-bottom: 14px; }
  .err { color: #c08080; font-size: 0.8rem; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="gate" class="screen">
    <div class="gate-page">
      <div class="gate-welcome">
        <div class="gate-welcome-title">Welcome, Parralleer</div>
      </div>
      <div class="campaign-cards">
        <div class="campaign-card gh">
          <div class="campaign-card-bg">
            <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=800&q=80&fit=crop&crop=center" alt="The Green Hunger" onerror="this.style.display='none'"/>
          </div>
          <div class="campaign-card-filter"></div>
          <div class="campaign-card-scrim"></div>
          <div class="campaign-card-content">
            <div class="campaign-card-tag gh">Current campaign</div>
            <div class="campaign-card-name">The Green Hunger</div>
            <div class="campaign-sessions" id="gate-gh-sessions"></div>
          </div>
        </div>
        <div class="campaign-card arc">
          <div class="campaign-card-bg">
            <img src="https://images.unsplash.com/photo-1465101162946-4377e57745c3?w=800&q=80&fit=crop&crop=center" alt="Arcadia" onerror="this.style.display='none'"/>
          </div>
          <div class="campaign-card-filter"></div>
          <div class="campaign-card-scrim"></div>
          <div class="campaign-card-content">
            <div class="campaign-card-tag arc">Also playing</div>
            <div class="campaign-card-name">Arcadia</div>
            <div class="campaign-sessions" id="gate-arc-sessions"></div>
          </div>
        </div>
      </div>
      <div class="gate-player-section">
        <div class="field hidden" id="secretWrap">
          <label for="secret">Group secret</label>
          <input id="secret" type="password" autocomplete="current-password" placeholder="From your DM"/>
        </div>
        <div class="gate-register-label">Register your availability</div>
        <div id="playerPicker" class="player-grid" aria-label="Select your player"></div>
        <input id="playerSel" type="hidden" value=""/>
        <button type="button" class="continue-btn" id="btnLogin">Continue</button>
        <p id="gateErr" class="err" style="display:none;margin-top:10px;"></p>
      </div>
    </div>
  </div>

  <div id="app" class="screen hidden">
    <div class="app-header">
      <div>
        <div class="app-title">Sessions</div>
        <div class="app-sub">Signed in as <strong id="dispName"></strong> · The Parralleers</div>
      </div>
      <button type="button" class="signout-btn" id="btnLogout">Sign out</button>
    </div>
    <div class="content">
      <div id="confirmed-wrap"></div>
      <div class="cal-sync-wrap" id="ics-box">
        <button
          type="button"
          class="cal-sync-toggle"
          id="btnToggleIcsPanel"
          aria-expanded="false"
          aria-controls="ics-panel"
        >
          <span>
            <span class="cal-sync-title">Calendar sync</span>
            <span class="cal-sync-hint">Subscribe in Apple or Google Calendar</span>
          </span>
          <span class="cal-sync-chevron">&#8964;</span>
        </button>
        <div class="cal-sync-panel" id="ics-panel" hidden>
          <div class="cal-sync-note">Shows confirmed sessions where you voted Yes.</div>
          <div class="cal-sync-primary">
            <button type="button" class="small-btn" id="btnSubscribeIcs">Subscribe</button>
          </div>
          <details class="cal-sync-advanced" id="ics-advanced">
            <summary>Advanced options</summary>
            <div id="ics-url" class="cal-feed-url"></div>
            <div class="cal-feed-btns">
              <button type="button" class="small-btn" id="btnCopyIcs">Copy feed URL</button>
              <button type="button" class="small-btn" id="btnRotateIcs">Rotate link</button>
            </div>
          </details>
        </div>
      </div>
      <div class="month-nav">
        <button type="button" class="month-nav-btn" id="btnMonthPrev" aria-label="Previous month">&#8249;</button>
        <span id="monthLabel" class="month-nav-title"></span>
        <button type="button" class="month-nav-btn" id="btnMonthNext" aria-label="Next month">&#8250;</button>
      </div>
      <div class="filter-row">
        <div class="filter-toggle" id="filterMissingVoteToggle">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
          <span class="filter-toggle-label">Only days I haven't voted on</span>
        </div>
        <div class="filter-toggle" id="filterFullTableToggle">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
          <span class="filter-toggle-label">Full table dates only</span>
        </div>
      </div>
      <div class="divider"></div>
      <div id="dayList"></div>
    </div>
  </div>

  <div id="sheet-confirm" class="sheet-overlay" aria-hidden="true">
    <div class="sheet">
      <h3 id="confirmTitle">Confirm session</h3>
      <div id="confirmVoteSummary" class="field" style="font-size:0.8rem;color:var(--text-dim);"></div>
      <div class="field">
        <label for="cfKind">Session</label>
        <select id="cfKind">
          <option value="green_hunger">The Green Hunger (full party)</option>
          <option value="arcadia">Arcadia</option>
        </select>
      </div>
      <div class="field" style="display:flex;gap:10px;">
        <div style="flex:1;">
          <label for="cfStart">Start</label>
          <input id="cfStart" type="time" value="18:30"/>
        </div>
        <div style="flex:1;">
          <label for="cfEnd">End</label>
          <input id="cfEnd" type="time" value="22:00"/>
        </div>
      </div>
      <div class="field">
        <label for="cfLoc">Location / notes</label>
        <textarea id="cfLoc" placeholder="Address or 'Online'"></textarea>
      </div>
      <div class="field" id="cfAttWrap">
        <label>Players in this session</label>
        <div id="cfAtt"></div>
      </div>
      <p id="cfErr" class="err" style="display:none;"></p>
      <div class="row-actions">
        <button type="button" class="btn btn-ghost" id="cfCancel">Cancel</button>
        <button type="button" class="btn btn-primary" id="cfSave">Confirm</button>
      </div>
    </div>
  </div>

  <div id="sheet-detail" class="sheet-overlay sheet-from-top" aria-hidden="true">
    <div class="sheet">
      <h3 id="detTitle">Session</h3>
      <div id="detBody" style="font-size:0.85rem;color:var(--text-dim);line-height:1.5;"></div>
      <div class="det-actions">
        <button type="button" class="btn btn-ghost" id="detClose">Close</button>
        <button type="button" class="btn btn-ghost" id="detEdit">Edit</button>
        <button type="button" class="btn btn-primary" id="detIcs">Download .ics</button>
        <button type="button" class="btn btn-ghost" id="detUnbook" style="border-color:#7a5a5a;color:#d4a8a8;">Remove booking</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    var APP = { dates: [], players: [], confirmedGames: [], fullTableDates: [], arcadiaDefaultLocation: '', pendingIso: null, saveT: null, viewMonth: '', todayIso: '', hasScrolledToToday: false, editBooking: false, _editSnapshot: null, initialLoadPending: false, icsUrl: '', icsWebcalUrl: '', hasTriedSubscribe: false };

    /** True after successful login this page load; avoids boot()'s stale authMe failing later and calling showGate(). */
    var loginWonRace = false;

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function api(action, payload) {
      return fetch('/api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ action: action, payload: payload || {} })
      }).then(function(r){ return r.json(); });
    }

    function showGate() {
      document.getElementById('gate').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
    }
    function showApp() {
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    function voteClass(v) {
      if (v === 'available') return 'avail';
      if (v === 'maybe') return 'maybe';
      if (v === 'unavailable') return 'nope';
      return '';
    }
    function voteLabel(v) {
      if (v === 'available') return 'Yes';
      if (v === 'maybe') return 'Maybe';
      if (v === 'unavailable') return 'No';
      return '—';
    }

    function distinctMonths(dates) {
      var m = {};
      (dates || []).forEach(function(d) { m[d.iso.slice(0, 7)] = true; });
      return Object.keys(m).sort();
    }

    function monthTitle(ym) {
      var parts = ym.split('-');
      var mo = parseInt(parts[1], 10) - 1;
      var names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return names[mo] + ' ' + parts[0];
    }

    function ensureViewMonth() {
      var months = distinctMonths(APP.dates || []);
      if (!months.length) { APP.viewMonth = ''; return; }
      if (!APP.viewMonth || months.indexOf(APP.viewMonth) === -1) {
        var todayStr = APP.todayIso || new Date().toISOString().slice(0, 10);
        var tym = todayStr.slice(0, 7);
        APP.viewMonth = months.indexOf(tym) !== -1 ? tym : months[0];
      }
    }

    function monthNameFromIso(iso) {
      var mo = parseInt(String(iso || '').slice(5, 7), 10) - 1;
      var names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return names[mo] || '';
    }

    function voteIsNonIdeal(v) {
      return v === '' || v === 'maybe' || v === 'unavailable';
    }

    function collectBookingWarnings(kind, iso, attendeeIds) {
      var d = findDateEntry(iso);
      if (!d || !d.votes) return [];
      var warns = [];
      var ids = kind === 'green_hunger'
        ? (APP.players || []).map(function(p) { return p.id; })
        : attendeeIds.slice();
      ids.forEach(function(id) {
        var v = d.votes[id] || '';
        if (voteIsNonIdeal(v)) {
          var p = (APP.players || []).find(function(x) { return x.id === id; });
          var name = p ? p.displayName : id;
          warns.push(name + ': ' + voteLabel(v));
        }
      });
      return warns;
    }

    function renderConfirmed() {
      var el = document.getElementById('confirmed-wrap');
      if (!el) return;
      var games = APP.confirmedGames || [];
      if (!games.length) { el.innerHTML = ''; return; }

      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      function longDate(iso) {
        var d = new Date(iso + 'T12:00:00Z');
        return days[d.getUTCDay()] + ' ' + d.getUTCDate() + ' ' + months[d.getUTCMonth()];
      }

      var GH_IMG = 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=600&q=75&fit=crop&crop=center';
      var ARC_IMG = 'https://images.unsplash.com/photo-1465101162946-4377e57745c3?w=600&q=75&fit=crop&crop=center';

      var h = '<div class="section-label">Confirmed sessions</div><div class="confirmed-list">';

      games.forEach(function(g) {
        var isGH = g.kind === 'green_hunger';
        var img = isGH ? GH_IMG : ARC_IMG;
        var kindClass = isGH ? 'gh' : 'arc';
        var kindLabel = isGH ? 'The Green Hunger' : 'Arcadia';
        var attendees = (g.attendees || []).map(function(a) {
          return '<span class="chip' + (isGH ? '' : ' arc') + '">' + esc(a.displayName) + '</span>';
        }).join('');

        h += '<div class="session-card ' + kindClass + '" data-iso="' + esc(g.date) + '" role="button" tabindex="0">' +
          '<div class="session-card-bg"><img src="' + img + '" alt="' + kindLabel + '" onerror="this.parentElement.style.background=\'' + (isGH ? '#1a2a1a' : '#12101e') + '\'"/></div>' +
          '<div class="session-card-scrim"></div>' +
          '<div class="session-card-content">' +
            '<div class="session-campaign-tag ' + kindClass + '">' + esc(kindLabel) + '</div>' +
            '<div class="session-date-large">' + esc(longDate(g.date)) + '</div>' +
            '<div class="session-time-text">' + esc(g.startTime || '') + ' – ' + esc(g.endTime || '') + '</div>' +
            '<div class="session-chips">' + attendees + '</div>' +
          '</div>' +
        '</div>';
      });

      h += '</div>';
      el.innerHTML = h;

      el.querySelectorAll('.session-card').forEach(function(card) {
        card.addEventListener('click', function() {
          openBookingEditor(this.getAttribute('data-iso'));
        });
      });
    }

    function findDateEntry(iso) {
      return (APP.dates || []).find(function(d) { return d.iso === iso; });
    }
    function findConfirmed(iso) {
      return (APP.confirmedGames || []).find(function(c) { return c.date === iso; });
    }

    function updateMonthNav() {
      var months = distinctMonths(APP.dates || []);
      var label = document.getElementById('monthLabel');
      var prev = document.getElementById('btnMonthPrev');
      var next = document.getElementById('btnMonthNext');
      if (!label || !prev || !next) return;
      if (!APP.viewMonth || !months.length) {
        label.textContent = '';
        prev.disabled = true;
        next.disabled = true;
        return;
      }
      label.textContent = monthTitle(APP.viewMonth);
      var idx = months.indexOf(APP.viewMonth);
      prev.disabled = idx <= 0;
      next.disabled = idx < 0 || idx >= months.length - 1;
    }

    function renderDayList() {
      var el = document.getElementById('dayList');
      var all = APP.dates || [];
      if (!all.length) {
        el.innerHTML = APP.initialLoadPending
          ? '<p class="day-empty">Loading calendar…</p>'
          : '<p class="day-empty">No dates loaded.</p>';
        updateMonthNav();
        return;
      }
      ensureViewMonth();
      var rows = all.filter(function(d) { return d.iso.slice(0, 7) === APP.viewMonth; });
      if (document.getElementById('filterMissingVoteToggle') && document.getElementById('filterMissingVoteToggle').classList.contains('on')) {
        rows = rows.filter(function(d) { return !d.myVote; });
      }
      if (document.getElementById('filterFullTableToggle') && document.getElementById('filterFullTableToggle').classList.contains('on')) {
        rows = rows.filter(function(d) { return !!d.fullTableOk; });
      }
      if (!rows.length) {
        el.innerHTML = '<p class="day-empty">No days in this view.</p>';
        updateMonthNav();
        return;
      }
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      function pipClass(vote) {
        if (vote === 'available') return 'y';
        if (vote === 'maybe') return 'm';
        if (vote === 'unavailable') return 'n';
        return 'e';
      }
      var h = '';
      var todayIso = APP.todayIso || new Date().toISOString().slice(0, 10);
      rows.forEach(function(d) {
        var booked = !!findConfirmed(d.iso);
        var date = new Date(d.iso + 'T12:00:00Z');
        var weekday = days[date.getUTCDay()];
        var dayNum = date.getUTCDate();
        var monthLabel = months[date.getUTCMonth()];
        var my = d.myVote || '';
        var yOn = my === 'available' ? ' on' : '';
        var mOn = my === 'maybe' ? ' on' : '';
        var nOn = my === 'unavailable' ? ' on' : '';
        var expandIndicator;
        if (d.fullTableOk) {
          expandIndicator = '<span class="full-table-badge">Full<br>table</span>';
        } else {
          var pipHtml = '';
          (APP.players || []).forEach(function(p) {
            var v = (d.votes && d.votes[p.id]) || '';
            pipHtml += '<div class="pip ' + pipClass(v) + '"></div>';
          });
          expandIndicator = '<div class="pips-grid">' + pipHtml + '</div>';
        }
        var partyPills = '';
        (APP.players || []).forEach(function(p) {
          var v = (d.votes && d.votes[p.id]) || '';
          var cls = pipClass(v);
          var label = v === 'available' ? 'Yes' : v === 'maybe' ? 'Maybe' : v === 'unavailable' ? 'No' : '—';
          partyPills += '<span class="pp ' + cls + '">' + esc(p.displayName) + ': ' + label + '</span>';
        });
        var expandedAction = '';
        if (booked) {
          var bk = findConfirmed(d.iso);
          expandedAction = '<div class="confirmed-badge">✓ Confirmed' + (bk ? ' — ' + esc(bk.kindLabel || '') : '') + '</div>';
        } else {
          expandedAction = '<button type="button" class="book-btn js-book" data-iso="' + esc(d.iso) + '">Book session</button>';
        }
        var isToday = APP.todayIso && d.iso === APP.todayIso;
        var isPast = d.iso < todayIso;
        h += '<div class="day-row' + (isToday ? ' today-row' : '') + (isPast ? ' past-row' : '') + '" data-iso="' + esc(d.iso) + '">' +
          '<div class="day-collapsed">' +
          '<div class="day-date-col">' +
            '<div class="day-weekday">' + weekday + '</div>' +
            '<div class="day-num">' + dayNum + '</div>' +
            '<div class="day-month-label">' + monthLabel + '</div>' +
          '</div>' +
          '<div class="day-vote-col">' +
            '<div class="vote-btns-collapsed">' +
              '<button type="button" class="vbtn-sm yes' + yOn + ' js-vote" data-vote="available" data-iso="' + esc(d.iso) + '">Yes</button>' +
              '<button type="button" class="vbtn-sm maybe' + mOn + ' js-vote" data-vote="maybe" data-iso="' + esc(d.iso) + '">Maybe</button>' +
              '<button type="button" class="vbtn-sm no' + nOn + ' js-vote" data-vote="unavailable" data-iso="' + esc(d.iso) + '">No</button>' +
            '</div>' +
          '</div>' +
          '<div class="day-expand-col js-expand" data-iso="' + esc(d.iso) + '">' +
            expandIndicator +
            '<span class="chevron">&#8964;</span>' +
          '</div>' +
          '</div>' +
          '<div class="day-expanded">' +
            '<div class="exp-party-label">Party votes</div>' +
            '<div class="party-pills-row">' + partyPills + '</div>' +
            expandedAction +
          '</div>' +
          '</div>';
      });
      el.innerHTML = h;
      updateMonthNav();
      el.querySelectorAll('.js-vote').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var iso = this.getAttribute('data-iso');
          var vote = this.getAttribute('data-vote');
          var d = findDateEntry(iso);
          if (!d) return;
          d.myVote = (d.myVote === vote) ? '' : vote;
          queueSave();
          renderDayList();
        });
      });
      el.querySelectorAll('.js-expand').forEach(function(col) {
        col.addEventListener('click', function() {
          var iso = this.getAttribute('data-iso');
          var row = el.querySelector('.day-row[data-iso="' + iso + '"]');
          if (row) row.classList.toggle('open');
        });
      });
      el.querySelectorAll('.js-book').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          openConfirm(this.getAttribute('data-iso'));
        });
      });
      if (!APP.hasScrolledToToday && APP.todayIso) {
        APP.hasScrolledToToday = true;
        requestAnimationFrame(function() {
          var row = el.querySelector('.day-row[data-iso="' + APP.todayIso + '"]');
          if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
        });
      }
    }

    function setMyVote(iso, v) {
      var d = findDateEntry(iso);
      if (!d) return;
      d.myVote = v;
      renderDayList();
      queueSave();
    }

    function setSelectedPlayer(playerId) {
      var hidden = document.getElementById('playerSel');
      hidden.value = playerId || '';
      document.querySelectorAll('.player-choice').forEach(function(btn) {
        var active = btn.getAttribute('data-id') === hidden.value;
        if (active) btn.classList.add('on');
        else btn.classList.remove('on');
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    function queueSave() {
      if (APP.saveT) clearTimeout(APP.saveT);
      APP.saveT = setTimeout(saveVotesNow, 450);
    }

    function saveVotesNow() {
      var votes = [];
      (APP.dates || []).forEach(function(d) {
        if (d.myVote) votes.push({ date: d.iso, vote: d.myVote });
      });
      api('saveVotes', { votes: votes }).then(function(r) {
        if (!r.ok) { alert(r.error || 'Save failed'); return; }
        mergeApp(r);
      });
    }

    function mergeApp(r) {
      if (r.dates) APP.dates = r.dates;
      if (r.confirmedGames) APP.confirmedGames = r.confirmedGames;
      if (r.players) APP.players = r.players;
      if (r.fullTableDates) APP.fullTableDates = r.fullTableDates;
      if (r.arcadiaDefaultLocation) APP.arcadiaDefaultLocation = r.arcadiaDefaultLocation;
      if (r.todayIso) APP.todayIso = r.todayIso;
      if (r.me && r.me.displayName) document.getElementById('dispName').textContent = r.me.displayName;
      ensureViewMonth();
      renderConfirmed();
      renderDayList();
      if (!APP.hasScrolledToToday && APP.todayIso) {
        APP.hasScrolledToToday = true;
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            var row = document.querySelector('.day-row[data-iso="' + APP.todayIso + '"]');
            if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
          });
        });
      }
    }

    function loadAppData() {
      APP.initialLoadPending = true;
      renderDayList();
      return api('getAppData', {}).then(function(r) {
        APP.initialLoadPending = false;
        if (!r.ok) { showGate(); return; }
        mergeApp(r);
        if (r.me) document.getElementById('dispName').textContent = r.me.displayName || '';
        loadIcs();
      }).catch(function() {
        APP.initialLoadPending = false;
        showGate();
      });
    }

    function renderIcsUi() {
      var el = document.getElementById('ics-url');
      var copyBtn = document.getElementById('btnCopyIcs');
      var rotateBtn = document.getElementById('btnRotateIcs');
      var subscribeBtn = document.getElementById('btnSubscribeIcs');
      if (!el || !copyBtn || !rotateBtn || !subscribeBtn) return;
      if (!APP.icsUrl) {
        el.textContent = '(could not load feed URL)';
        copyBtn.disabled = true;
        rotateBtn.disabled = true;
        subscribeBtn.disabled = true;
        return;
      }
      copyBtn.disabled = false;
      rotateBtn.disabled = false;
      subscribeBtn.disabled = false;
      el.textContent = APP.icsUrl;
    }

    function setIcsPanelOpen(isOpen) {
      var wrap = document.getElementById('ics-box');
      var panel = document.getElementById('ics-panel');
      var btn = document.getElementById('btnToggleIcsPanel');
      if (!wrap || !panel || !btn) return;
      if (isOpen) {
        wrap.classList.add('open');
        panel.hidden = false;
        btn.setAttribute('aria-expanded', 'true');
      } else {
        wrap.classList.remove('open');
        panel.hidden = true;
        btn.setAttribute('aria-expanded', 'false');
      }
    }

    function showIcsFallbackOptions(message) {
      var advanced = document.getElementById('ics-advanced');
      if (advanced) advanced.open = true;
      if (message) alert(message);
    }

    function loadIcs() {
      api('getCalendarFeedLinks', { origin: window.location.origin }).then(function(r) {
        if (r.ok && r.url) {
          APP.icsUrl = r.url || '';
          APP.icsWebcalUrl = r.webcalUrl || r.url || '';
        } else {
          APP.icsUrl = '';
          APP.icsWebcalUrl = '';
        }
        renderIcsUi();
      });
    }

    document.getElementById('btnCopyIcs').addEventListener('click', function() {
      if (!APP.icsUrl) return;
      navigator.clipboard.writeText(APP.icsUrl).then(function() {
        alert('Feed URL copied');
      });
    });

    document.getElementById('btnSubscribeIcs').addEventListener('click', function() {
      if (!APP.icsUrl) return;
      APP.hasTriedSubscribe = true;
      var subscribeUrl = APP.icsWebcalUrl || APP.icsUrl;
      var fallbackUrl = APP.icsUrl;
      window.location.href = subscribeUrl;
      setTimeout(function() {
        if (document.visibilityState === 'visible') {
          window.open(fallbackUrl, '_blank', 'noopener');
          showIcsFallbackOptions('If your calendar app did not open, use Advanced options.');
        }
      }, 900);
    });

    document.getElementById('btnRotateIcs').addEventListener('click', function() {
      if (!confirm('Create a new subscription link? Existing subscriptions will stop updating.')) return;
      api('rotateCalendarFeedToken', { origin: window.location.origin }).then(function(r) {
        if (!r.ok) { alert(r.error || 'Failed'); return; }
        APP.icsUrl = r.url || '';
        APP.icsWebcalUrl = r.webcalUrl || r.url || '';
        alert('New subscription link created. Subscribe again in your calendar app.');
        renderIcsUi();
      });
    });

    document.getElementById('btnToggleIcsPanel').addEventListener('click', function() {
      var isOpen = this.getAttribute('aria-expanded') === 'true';
      setIcsPanelOpen(!isOpen);
    });

    function shiftMonth(delta) {
      var months = distinctMonths(APP.dates || []);
      var idx = months.indexOf(APP.viewMonth);
      var newIdx = idx + delta;
      if (newIdx < 0 || newIdx >= months.length) return;
      APP.viewMonth = months[newIdx];
      renderDayList();
    }

    document.getElementById('btnMonthPrev').addEventListener('click', function() { shiftMonth(-1); });
    document.getElementById('btnMonthNext').addEventListener('click', function() { shiftMonth(1); });
    document.getElementById('filterMissingVoteToggle').addEventListener('click', function() {
      this.classList.toggle('on');
      renderDayList();
    });
    document.getElementById('filterFullTableToggle').addEventListener('click', function() {
      this.classList.toggle('on');
      renderDayList();
    });

    function renderGateSessions(confirmedGames) {
      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      function formatLong(iso, startTime) {
        var d = new Date(iso + 'T12:00:00Z');
        var dayName = days[d.getUTCDay()];
        var date = d.getUTCDate();
        var month = months[d.getUTCMonth()];
        var timeParts = (startTime || '18:30').split(':');
        var hh = parseInt(timeParts[0], 10);
        var mm = timeParts[1] || '00';
        var ampm = hh >= 12 ? 'pm' : 'am';
        var h12 = hh % 12 || 12;
        return dayName + ' ' + date + ' ' + month + ', ' + h12 + ':' + mm + ampm;
      }
      var ghEl = document.getElementById('gate-gh-sessions');
      var arcEl = document.getElementById('gate-arc-sessions');
      if (!ghEl || !arcEl) return;
      var ghItems = '';
      var arcItems = '';
      var now = new Date().toISOString().slice(0, 10);
      (confirmedGames || []).forEach(function(g) {
        if (g.date < now) return;
        var label = formatLong(g.date, g.startTime);
        var item = '<div class="campaign-session-item">' + esc(label) + '</div>';
        if (g.kind === 'green_hunger') ghItems += item;
        else if (g.kind === 'arcadia') arcItems += item;
      });
      ghEl.innerHTML = ghItems || '';
      arcEl.innerHTML = arcItems || '';
    }

    function resetBookingEditorState() {
      APP.editBooking = false;
      APP._editSnapshot = null;
      document.getElementById('cfSave').textContent = 'Confirm';
    }

    function openConfirm(iso) {
      resetBookingEditorState();
      APP.pendingIso = iso;
      var d = findDateEntry(iso);
      if (!d) return;
      document.getElementById('confirmTitle').textContent = 'Confirm — ' + d.dayLabel + ', ' + d.label;
      var vs = '';
      (APP.players || []).forEach(function(p) {
        var v = (d.votes && d.votes[p.id]) || '';
        vs += '<div>' + esc(p.displayName) + ': <strong>' + esc(voteLabel(v)) + '</strong></div>';
      });
      document.getElementById('confirmVoteSummary').innerHTML = vs;
      document.getElementById('cfKind').value = 'green_hunger';
      document.getElementById('cfStart').value = '18:30';
      document.getElementById('cfEnd').value = '22:00';
      document.getElementById('cfLoc').value = '';
      document.getElementById('cfErr').style.display = 'none';
      syncKindUi();
      document.getElementById('cfKind').onchange = function() {
        APP._editSnapshot = null;
        syncKindUi();
      };
      document.getElementById('sheet-confirm').classList.add('open');
      document.getElementById('sheet-confirm').setAttribute('aria-hidden', 'false');
    }

    function openBookingEditor(iso) {
      var c = findConfirmed(iso);
      if (!c) return;
      APP.pendingIso = iso;
      APP.editBooking = true;
      APP._editSnapshot = c.kind === 'arcadia'
        ? { arcadiaAttendeeIds: (c.attendees || []).map(function(a) { return a.id; }) }
        : null;
      document.getElementById('confirmTitle').textContent = 'Edit session — ' + c.dayLabel + ', ' + c.label;
      document.getElementById('cfSave').textContent = 'Save changes';
      var d = findDateEntry(iso);
      var vs = '';
      if (d) {
        (APP.players || []).forEach(function(p) {
          var v = (d.votes && d.votes[p.id]) || '';
          vs += '<div>' + esc(p.displayName) + ': <strong>' + esc(voteLabel(v)) + '</strong></div>';
        });
      }
      document.getElementById('confirmVoteSummary').innerHTML = vs;
      document.getElementById('cfKind').value = c.kind;
      document.getElementById('cfStart').value = c.startTime || '18:30';
      document.getElementById('cfEnd').value = c.endTime || '22:00';
      document.getElementById('cfLoc').value = c.location || '';
      document.getElementById('cfErr').style.display = 'none';
      syncKindUi();
      document.getElementById('cfKind').onchange = function() {
        APP._editSnapshot = null;
        syncKindUi();
      };
      document.getElementById('sheet-detail').classList.remove('open');
      document.getElementById('sheet-confirm').classList.add('open');
      document.getElementById('sheet-confirm').setAttribute('aria-hidden', 'false');
    }

    var GH_LOC_DEFAULT = 'Online / home';

    function syncKindUi() {
      var kind = document.getElementById('cfKind').value;
      var loc = document.getElementById('cfLoc');
      var v = loc.value.trim();
      var arc = (APP.arcadiaDefaultLocation || '').trim();
      if (kind === 'arcadia') {
        if (!v || v === GH_LOC_DEFAULT) loc.value = arc;
      } else {
        if (!v || (arc && v === arc)) loc.value = GH_LOC_DEFAULT;
      }
      var att = document.getElementById('cfAtt');
      var html = '';
      var isGh = kind === 'green_hunger';
      var snap = APP._editSnapshot;
      (APP.players || []).forEach(function(p) {
        var d = findDateEntry(APP.pendingIso);
        var vv = d && d.votes ? (d.votes[p.id] || '') : '';
        var dis = isGh ? ' disabled' : '';
        var checked;
        if (isGh) {
          checked = true;
        } else if (snap && snap.arcadiaAttendeeIds) {
          checked = snap.arcadiaAttendeeIds.indexOf(p.id) !== -1;
        } else {
          checked = (vv === 'available' || vv === 'maybe');
        }
        var chkAttr = checked ? ' checked' : '';
        html += '<label style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:0.85rem;">' +
          '<input type="checkbox" class="cf-att-cb" data-id="' + esc(p.id) + '"' + chkAttr + dis + '/> ' +
          esc(p.displayName) +
        '</label>';
      });
      att.innerHTML = html;
    }

    document.getElementById('cfCancel').addEventListener('click', function() {
      resetBookingEditorState();
      document.getElementById('sheet-confirm').classList.remove('open');
    });
    document.getElementById('cfSave').addEventListener('click', function() {
      var iso = APP.pendingIso;
      var kind = document.getElementById('cfKind').value;
      var start = document.getElementById('cfStart').value;
      var end = document.getElementById('cfEnd').value;
      var loc = document.getElementById('cfLoc').value.trim();
      var ids = [];
      document.querySelectorAll('.cf-att-cb').forEach(function(cb) {
        if (cb.checked) ids.push(cb.getAttribute('data-id'));
      });
      var err = document.getElementById('cfErr');
      err.style.display = 'none';
      var warns = collectBookingWarnings(kind, iso, ids);
      if (warns.length) {
        var msg = 'Some players have not voted Yes, or voted Maybe/No, or have no vote:\n\n' + warns.join('\n') +
          '\n\nBook this session anyway?';
        if (!window.confirm(msg)) return;
      }
      var payload = {
        date: iso,
        kind: kind,
        startTime: start,
        endTime: end,
        location: loc,
        attendeePlayerIds: ids
      };
      if (APP.editBooking) payload.replaceExisting = true;
      api('confirmSession', payload).then(function(r) {
        if (!r.ok) {
          err.textContent = r.error || 'Could not confirm';
          err.style.display = 'block';
          return;
        }
        resetBookingEditorState();
        mergeApp(r);
        document.getElementById('sheet-confirm').classList.remove('open');
      });
    });

    var DET_ISO = null;
    function openDetail(iso) {
      DET_ISO = iso;
      var c = findConfirmed(iso);
      if (!c) return;
      document.getElementById('detTitle').textContent = c.kindLabel + ' — ' + c.label;
      var body = (c.sessionTime || '') + '<br/>' + esc(c.location || '(no location)') + '<br/><br/>Players: ';
      body += (c.attendees || []).map(function(a){ return esc(a.displayName); }).join(', ');
      document.getElementById('detBody').innerHTML = body;
      document.getElementById('sheet-detail').classList.add('open');
    }
    document.getElementById('detClose').addEventListener('click', function() {
      document.getElementById('sheet-detail').classList.remove('open');
    });
    document.getElementById('detEdit').addEventListener('click', function() {
      if (DET_ISO) openBookingEditor(DET_ISO);
    });
    document.getElementById('detIcs').addEventListener('click', function() {
      api('getSingleEventCalendarIcs', { date: DET_ISO }).then(function(r) {
        if (!r.ok || !r.ics) { alert(r.error || 'Failed'); return; }
        var blob = new Blob([r.ics], { type: 'text/calendar;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'session-' + DET_ISO + '.ics';
        a.click();
        URL.revokeObjectURL(a.href);
      });
    });
    document.getElementById('detUnbook').addEventListener('click', function() {
      if (!confirm('Remove this confirmed session?')) return;
      api('unconfirmSession', { date: DET_ISO }).then(function(r) {
        if (!r.ok) { alert(r.error || 'Failed'); return; }
        mergeApp(r);
        document.getElementById('sheet-detail').classList.remove('open');
      });
    });

    document.getElementById('btnLogin').addEventListener('click', function() {
      var secret = document.getElementById('secret').value;
      var playerId = document.getElementById('playerSel').value;
      var ge = document.getElementById('gateErr');
      ge.style.display = 'none';
      api('login', { groupSecret: secret, playerId: playerId }).then(function(r) {
        if (!r.ok) {
          ge.textContent = r.error || 'Login failed';
          ge.style.display = 'block';
          return;
        }
        loginWonRace = true;
        showApp();
        if (r.me) document.getElementById('dispName').textContent = r.me.displayName || '';
        loadAppData();
      });
    });

    document.getElementById('btnLogout').addEventListener('click', function() {
      APP.viewMonth = '';
      APP.todayIso = '';
      APP.hasScrolledToToday = false;
      APP.hasTriedSubscribe = false;
      APP.icsUrl = '';
      APP.icsWebcalUrl = '';
      api('logout', {}).then(function() { showGate(); });
    });

    function boot() {
      setIcsPanelOpen(false);
      api('authMe', {}).then(function(r) {
        if (r.ok && r.me) {
          loginWonRace = true;
          document.getElementById('dispName').textContent = r.me.displayName || '';
          showApp();
          loadAppData();
        } else if (!loginWonRace) {
          api('getPublicBootstrap', {}).then(function(b) {
            if (loginWonRace) return;
            var picker = document.getElementById('playerPicker');
            if (b.ok && b.players) {
              var sortedPlayers = b.players.slice().sort(function(a, z) {
                return String(a.displayName || '').localeCompare(String(z.displayName || ''), undefined, { sensitivity: 'base' });
              });
              picker.innerHTML = '';
              sortedPlayers.forEach(function(p) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'player-choice';
                btn.textContent = p.displayName;
                btn.setAttribute('data-id', p.id);
                btn.setAttribute('aria-pressed', 'false');
                btn.addEventListener('click', function() {
                  setSelectedPlayer(p.id);
                });
                picker.appendChild(btn);
              });
              setSelectedPlayer(sortedPlayers[0] ? sortedPlayers[0].id : '');
            } else {
              picker.innerHTML = '<span style="font-size:0.85rem;color:var(--text-dim);">No players configured</span>';
              setSelectedPlayer('');
            }
            var sw = document.getElementById('secretWrap');
            var needSecret = !!(b.ok && b.requiresGroupSecret);
            if (needSecret) sw.classList.remove('hidden');
            else sw.classList.add('hidden');
            renderGateSessions(b.confirmedGames || []);
            showGate();
          });
        }
      });
    }

    boot();
  })();
  </script>
</body>
</html>
