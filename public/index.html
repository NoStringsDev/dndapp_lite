<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>The Green Hunger — Sessions</title>
  <meta name="description" content="Coordinate sessions for The Green Hunger and Arcadia games."/>
  <meta name="theme-color" content="#0d1210"/>
  <meta name="apple-mobile-web-app-title" content="Green Hunger"/>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg"/>
  <link rel="apple-touch-icon" href="./favicon.svg"/>
  <script>
  (function(){
    var m = {
      name: 'The Green Hunger — Sessions',
      short_name: 'Green Hunger',
      description: 'Party availability and confirmed sessions',
      start_url: './',
      display: 'standalone',
      background_color: '#0d1210',
      theme_color: '#0d1210',
      icons: [
        { src: './favicon.svg', sizes: 'any', type: 'image/svg+xml', purpose: 'any maskable' }
      ]
    };
    var link = document.createElement('link');
    link.rel = 'manifest';
    link.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(m));
    document.head.appendChild(link);
  })();
  </script>
  <style>
  :root {
    --bg-deep: #0a0f0c;
    --bg-card: #121a16;
    --bg-elevated: #18231d;
    --mist: rgba(120, 160, 130, 0.08);
    --accent: #6b9f7d;
    --accent-hover: #7fb892;
    --accent-muted: #3d5c4a;
    --text: #e4eae6;
    --text-dim: #8fa396;
    --border: #2a3830;
    --avail: #4a8a62;
    --maybe: #b89a5a;
    --nay: #7a5a5a;
    --radius: 10px;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    margin: 0;
    min-height: 100dvh;
    font-family: var(--font);
    background: var(--bg-deep);
    background-image:
      radial-gradient(ellipse 120% 80% at 50% -20%, rgba(90, 130, 100, 0.18), transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, #0d1512 100%);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }
  .screen { max-width: 720px; margin: 0 auto; padding: 16px 14px 48px; }
  h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
    color: var(--accent);
  }
  .sub { font-size: 0.82rem; color: var(--text-dim); line-height: 1.45; margin-bottom: 18px; }
  .gate-card, .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 6px; }
  input[type="password"], input[type="text"], input[type="time"], select, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    font-size: 0.95rem;
  }
  textarea { min-height: 56px; resize: vertical; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 16px; border-radius: 8px; border: none;
    font-weight: 600; font-size: 0.88rem; cursor: pointer;
    background: var(--accent-muted); color: var(--text);
  }
  .btn-primary { background: linear-gradient(180deg, var(--accent) 0%, var(--accent-muted) 100%); color: #0a100c; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .row-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .player-picker { display: flex; flex-wrap: wrap; gap: 8px; }
  .player-choice {
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .player-choice.on {
    border-color: var(--accent);
    background: rgba(107,159,125,0.12);
    color: var(--accent);
    font-weight: 600;
  }
  .app-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .who { font-size: 0.8rem; color: var(--text-dim); }
  .day-row {
    display: grid;
    grid-template-columns: 52px 1fr minmax(108px, 38%);
    gap: 8px 10px;
    align-items: start;
    padding: 10px 0;
    border-bottom: 1px solid rgba(42,56,48,0.6);
  }
  .day-row.day-is-today {
    background: rgba(107,159,125,0.07);
    border-radius: 8px;
    margin: 2px -8px;
    padding-left: 8px;
    padding-right: 8px;
  }
  .day-row:last-child { border-bottom: none; }
  .day-date-col { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .day-week { font-size: 0.72rem; color: var(--text-dim); line-height: 1.2; }
  .day-date-main { display: flex; align-items: baseline; gap: 7px; }
  .day-num { font-size: 1.55rem; font-weight: 800; line-height: 1; color: var(--text); letter-spacing: -0.03em; }
  .day-month { font-size: 1.02rem; font-weight: 800; line-height: 1; color: var(--text); letter-spacing: -0.02em; }
  .day-my-col { min-width: 0; }
  .vote-pills-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid rgba(42,56,48,0.7);
    background: rgba(24,35,29,0.45);
  }
  .vote-pills-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #7f9087;
    font-weight: 700;
  }
  .vote-pills { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; justify-content: flex-end; }
  .vp { font-size: 0.64rem; padding: 2px 6px; border-radius: 999px; background: rgba(16,24,20,0.92); border: 1px solid #304239; color: #a9baaf; }
  .vp.avail { border-color: var(--avail); color: #b8dcc4; }
  .vp.maybe { border-color: var(--maybe); color: #e8d9b8; }
  .vp.nope { border-color: var(--nay); color: #d4b8b8; }
  .my-vote-label {
    font-size: 0.68rem;
    color: #9db0a4;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .my-vote { display: flex; gap: 8px; flex-wrap: wrap; }
  .my-vote button {
    min-height: 42px;
    min-width: 72px;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid #3a4f42;
    background: #111a16;
    color: #9fb0a6;
    cursor: pointer;
    touch-action: manipulation;
    transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
  }
  .my-vote button:focus-visible {
    outline: 2px solid rgba(107,159,125,0.55);
    outline-offset: 1px;
  }
  .my-vote button.vote-yes.on {
    border-color: #7ec996;
    color: #072214;
    background: linear-gradient(180deg, #8ddba7 0%, #66b883 100%);
    box-shadow: 0 0 0 1px rgba(125, 196, 153, 0.25);
  }
  .my-vote button.vote-maybe.on {
    border-color: #d9b168;
    color: #22180a;
    background: linear-gradient(180deg, #eac680 0%, #c99849 100%);
    box-shadow: 0 0 0 1px rgba(217, 177, 104, 0.22);
  }
  .my-vote button.vote-no.on {
    border-color: #d38c8c;
    color: #261212;
    background: linear-gradient(180deg, #dd9a9a 0%, #c76f6f 100%);
    box-shadow: 0 0 0 1px rgba(211, 140, 140, 0.22);
  }
  .badge-ft { font-size: 0.62rem; padding: 2px 8px; border-radius: 999px; background: rgba(107,159,125,0.2); color: var(--accent); font-weight: 700; }
  .day-actions-col { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 0; }
  .day-actions-btns { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; width: 100%; }
  .day-actions-btns .btn { width: 100%; max-width: 140px; min-height: 42px; font-size: 0.86rem; padding: 9px 10px; }
  .month-nav .btn { padding: 6px 12px; font-size: 0.85rem; }
  .cal-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 12px; justify-content: space-between; }
  .cal-controls label { margin: 0; text-transform: none; letter-spacing: normal; font-size: 0.78rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .confirmed-widget {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .confirmed-hdr {
    padding: 10px 12px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    background: rgba(107,159,125,0.06);
  }
  .confirmed-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(42,56,48,0.5);
    cursor: pointer;
  }
  .confirmed-row:last-child { border-bottom: none; }
  .confirmed-row:hover { background: rgba(107,159,125,0.05); }
  .confirmed-date { font-weight: 700; font-size: 0.85rem; color: var(--text); min-width: 72px; }
  .confirmed-time { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
  .confirmed-kind { font-size: 0.68rem; color: var(--accent); margin-top: 4px; }
  .confirmed-chips-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .chip { font-size: 0.65rem; padding: 2px 8px; border-radius: 999px; background: var(--bg-elevated); border: 1px solid var(--border); }
  .cal-subscribe-box {
    background: rgba(107,159,125,0.06);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 16px;
    font-size: 0.78rem;
    color: var(--text-dim);
  }
  .cal-url { word-break: break-all; font-size: 0.72rem; margin-top: 8px; color: var(--accent); }
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 50; padding: 12px;
  }
  .sheet-overlay.sheet-from-top {
    align-items: flex-start;
    padding-top: max(12px, env(safe-area-inset-top, 0px));
    padding-bottom: 12px;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    width: 100%; max-width: 480px; max-height: 90dvh; overflow: auto;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 16px;
  }
  .sheet-from-top .sheet {
    border-radius: 0 0 var(--radius) var(--radius);
    max-height: min(90dvh, calc(100dvh - 24px));
  }
  .confirmed-booking-hit {
    text-align: right; cursor: pointer; max-width: 140px; margin-left: auto;
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px;
    background: rgba(107,159,125,0.08);
    min-height: 44px;
    touch-action: manipulation;
  }
  .confirmed-booking-hit .cb-line1 { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); }
  .confirmed-booking-hit .cb-line2 { font-size: 0.72rem; color: var(--text); margin-top: 2px; line-height: 1.25; }
  .det-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; align-items: center; }
  .sheet h3 { margin: 0 0 12px; font-size: 1rem; color: var(--accent); }
  .field { margin-bottom: 12px; }
  .err { color: #c08080; font-size: 0.8rem; margin-top: 8px; }
  .hidden { display: none !important; }
  @media (max-width: 560px) {
    .day-row { grid-template-columns: 1fr; }
    .day-actions-col { align-items: stretch; }
    .day-row { gap: 10px; padding: 14px 0; }
    .my-vote { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .my-vote button { width: 100%; min-width: 0; }
    .day-actions-col { gap: 10px; }
    .vote-pills-wrap { order: 1; align-items: flex-start; }
    .day-actions-btns { order: 2; align-items: stretch; gap: 8px; }
    .vote-pills { justify-content: flex-start; }
    .day-actions-btns .btn { max-width: none; }
    .confirmed-booking-hit { max-width: none; width: 100%; margin-left: 0; align-self: stretch; text-align: left; }
  }
  </style>
</head>
<body>
  <div id="gate" class="screen">
    <h1 style="margin-bottom:12px;">The Green Hunger</h1>
    <div class="gate-card">
      <div class="field hidden" id="secretWrap">
        <label for="secret">Group secret</label>
        <input id="secret" type="password" autocomplete="current-password" placeholder="From your DM"/>
      </div>
      <div class="field">
        <label>You are</label>
        <div id="playerPicker" class="player-picker" aria-label="Select your player">
          <span style="font-size:0.85rem;color:var(--text-dim);">Loading…</span>
        </div>
        <input id="playerSel" type="hidden" value=""/>
      </div>
      <div class="row-actions">
        <button type="button" class="btn btn-primary" id="btnLogin">Continue</button>
      </div>
      <p id="gateErr" class="err" style="display:none;"></p>
    </div>
  </div>

  <div id="app" class="screen hidden">
    <div class="app-header">
      <div>
        <h1 style="margin-bottom:2px;">Sessions</h1>
        <div class="who">Signed in as <strong id="dispName"></strong></div>
      </div>
      <button type="button" class="btn btn-ghost" id="btnLogout">Sign out</button>
    </div>

    <div id="confirmed-wrap"></div>

    <div class="cal-subscribe-box" id="ics-box">
      <div style="font-weight:600;color:var(--text);margin-bottom:6px;">Calendar feed</div>
      <div>Subscribe in Apple Calendar or Google Calendar to see confirmed sessions.</div>
      <div id="ics-url" class="cal-url"></div>
      <div class="row-actions" style="margin-top:10px;">
        <button type="button" class="btn btn-ghost" id="btnCopyIcs">Copy feed URL</button>
        <button type="button" class="btn btn-ghost" id="btnRotateIcs">Rotate link</button>
      </div>
    </div>

    <div class="panel" style="padding:12px;">
      <div class="cal-controls">
        <div class="month-nav" style="display:flex;align-items:center;gap:8px;">
          <button type="button" class="btn btn-ghost" id="btnMonthPrev" aria-label="Previous month">◀</button>
          <span id="monthLabel" style="font-weight:600;min-width:150px;text-align:center;font-size:0.9rem;"></span>
          <button type="button" class="btn btn-ghost" id="btnMonthNext" aria-label="Next month">▶</button>
        </div>
        <label><input type="checkbox" id="filterMissingVote"/> Only days I haven’t voted on</label>
      </div>
      <div id="dayList"></div>
    </div>
  </div>

  <div id="sheet-confirm" class="sheet-overlay" aria-hidden="true">
    <div class="sheet">
      <h3 id="confirmTitle">Confirm session</h3>
      <div id="confirmVoteSummary" class="field" style="font-size:0.8rem;color:var(--text-dim);"></div>
      <div class="field">
        <label for="cfKind">Session</label>
        <select id="cfKind">
          <option value="green_hunger">The Green Hunger (full party)</option>
          <option value="arcadia">Arcadia</option>
        </select>
      </div>
      <div class="field" style="display:flex;gap:10px;">
        <div style="flex:1;">
          <label for="cfStart">Start</label>
          <input id="cfStart" type="time" value="18:30"/>
        </div>
        <div style="flex:1;">
          <label for="cfEnd">End</label>
          <input id="cfEnd" type="time" value="22:00"/>
        </div>
      </div>
      <div class="field">
        <label for="cfLoc">Location / notes</label>
        <textarea id="cfLoc" placeholder="Address or 'Online'"></textarea>
      </div>
      <div class="field" id="cfAttWrap">
        <label>Players in this session</label>
        <div id="cfAtt"></div>
      </div>
      <p id="cfErr" class="err" style="display:none;"></p>
      <div class="row-actions">
        <button type="button" class="btn btn-ghost" id="cfCancel">Cancel</button>
        <button type="button" class="btn btn-primary" id="cfSave">Confirm</button>
      </div>
    </div>
  </div>

  <div id="sheet-detail" class="sheet-overlay sheet-from-top" aria-hidden="true">
    <div class="sheet">
      <h3 id="detTitle">Session</h3>
      <div id="detBody" style="font-size:0.85rem;color:var(--text-dim);line-height:1.5;"></div>
      <div class="det-actions">
        <button type="button" class="btn btn-ghost" id="detClose">Close</button>
        <button type="button" class="btn btn-ghost" id="detEdit">Edit</button>
        <button type="button" class="btn btn-primary" id="detIcs">Download .ics</button>
        <button type="button" class="btn btn-ghost" id="detUnbook" style="border-color:#7a5a5a;color:#d4a8a8;">Remove booking</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    var APP = { dates: [], players: [], confirmedGames: [], fullTableDates: [], arcadiaDefaultLocation: '', pendingIso: null, saveT: null, viewMonth: '', todayIso: '', hasScrolledToToday: false, editBooking: false, _editSnapshot: null, initialLoadPending: false };

    /** True after successful login this page load; avoids boot()'s stale authMe failing later and calling showGate(). */
    var loginWonRace = false;

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function api(action, payload) {
      return fetch('/api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ action: action, payload: payload || {} })
      }).then(function(r){ return r.json(); });
    }

    function showGate() {
      document.getElementById('gate').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
    }
    function showApp() {
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    function voteClass(v) {
      if (v === 'available') return 'avail';
      if (v === 'maybe') return 'maybe';
      if (v === 'unavailable') return 'nope';
      return '';
    }
    function voteLabel(v) {
      if (v === 'available') return 'Yes';
      if (v === 'maybe') return 'Maybe';
      if (v === 'unavailable') return 'No';
      return '—';
    }

    function distinctMonths(dates) {
      var m = {};
      (dates || []).forEach(function(d) { m[d.iso.slice(0, 7)] = true; });
      return Object.keys(m).sort();
    }

    function monthTitle(ym) {
      var parts = ym.split('-');
      var mo = parseInt(parts[1], 10) - 1;
      var names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return names[mo] + ' ' + parts[0];
    }

    function ensureViewMonth() {
      var months = distinctMonths(APP.dates || []);
      if (!months.length) { APP.viewMonth = ''; return; }
      if (!APP.viewMonth || months.indexOf(APP.viewMonth) === -1) {
        var todayStr = APP.todayIso || new Date().toISOString().slice(0, 10);
        var tym = todayStr.slice(0, 7);
        APP.viewMonth = months.indexOf(tym) !== -1 ? tym : months[0];
      }
    }

    function monthNameFromIso(iso) {
      var mo = parseInt(String(iso || '').slice(5, 7), 10) - 1;
      var names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      return names[mo] || '';
    }

    function voteIsNonIdeal(v) {
      return v === '' || v === 'maybe' || v === 'unavailable';
    }

    function collectBookingWarnings(kind, iso, attendeeIds) {
      var d = findDateEntry(iso);
      if (!d || !d.votes) return [];
      var warns = [];
      var ids = kind === 'green_hunger'
        ? (APP.players || []).map(function(p) { return p.id; })
        : attendeeIds.slice();
      ids.forEach(function(id) {
        var v = d.votes[id] || '';
        if (voteIsNonIdeal(v)) {
          var p = (APP.players || []).find(function(x) { return x.id === id; });
          var name = p ? p.displayName : id;
          warns.push(name + ': ' + voteLabel(v));
        }
      });
      return warns;
    }

    function renderConfirmed() {
      var wrap = document.getElementById('confirmed-wrap');
      var g = APP.confirmedGames || [];
      var today = APP.todayIso || new Date().toISOString().slice(0, 10);
      var upcoming = g.filter(function(c) { return c.date >= today; });
      if (!upcoming.length) { wrap.innerHTML = ''; return; }
      var h = '<div class="confirmed-widget"><div class="confirmed-hdr">Confirmed sessions</div>';
      upcoming.forEach(function(c) {
        var safeIso = esc(c.date);
        h += '<div class="confirmed-row" data-iso="' + safeIso + '">' +
          '<div><div class="confirmed-date">' + esc(c.label) + '</div>' +
          '<div class="confirmed-time">' + esc(c.sessionTime || '') + '</div>' +
          '<div class="confirmed-kind">' + esc(c.kindLabel || '') + '</div></div>' +
          '<div style="flex:1;"><div class="confirmed-chips-row">';
        (c.attendees || []).forEach(function(a) {
          h += '<span class="chip">' + esc(a.displayName) + '</span>';
        });
        h += '</div></div></div>';
      });
      h += '</div>';
      wrap.innerHTML = h;
      wrap.querySelectorAll('.confirmed-row').forEach(function(el) {
        el.addEventListener('click', function() { openDetail(el.getAttribute('data-iso')); });
      });
    }

    function findDateEntry(iso) {
      return (APP.dates || []).find(function(d) { return d.iso === iso; });
    }
    function findConfirmed(iso) {
      return (APP.confirmedGames || []).find(function(c) { return c.date === iso; });
    }

    function updateMonthNav() {
      var months = distinctMonths(APP.dates || []);
      var label = document.getElementById('monthLabel');
      var prev = document.getElementById('btnMonthPrev');
      var next = document.getElementById('btnMonthNext');
      if (!label || !prev || !next) return;
      if (!APP.viewMonth || !months.length) {
        label.textContent = '';
        prev.disabled = true;
        next.disabled = true;
        return;
      }
      label.textContent = monthTitle(APP.viewMonth);
      var idx = months.indexOf(APP.viewMonth);
      prev.disabled = idx <= 0;
      next.disabled = idx < 0 || idx >= months.length - 1;
    }

    function renderDayList() {
      var el = document.getElementById('dayList');
      var all = APP.dates || [];
      if (!all.length) {
        el.innerHTML = APP.initialLoadPending
          ? '<p class="sub">Loading calendar…</p>'
          : '<p class="sub">No dates loaded.</p>';
        updateMonthNav();
        return;
      }
      ensureViewMonth();
      var rows = all.filter(function(d) { return d.iso.slice(0, 7) === APP.viewMonth; });
      if (document.getElementById('filterMissingVote') && document.getElementById('filterMissingVote').checked) {
        rows = rows.filter(function(d) { return !d.myVote; });
      }
      if (!rows.length) {
        el.innerHTML = '<p class="sub">No days in this view. Try another month or turn off the filter.</p>';
        updateMonthNav();
        return;
      }
      var playersByName = (APP.players || []).slice().sort(function(a, z) {
        return String(a.displayName || '').localeCompare(String(z.displayName || ''), undefined, { sensitivity: 'base' });
      });
      var h = '';
      rows.forEach(function(d) {
        var booked = !!findConfirmed(d.iso);
        var dayNum = String(parseInt(d.iso.slice(8, 10), 10));
        var dayMonth = monthNameFromIso(d.iso);
        var pills = '';
        playersByName.forEach(function(p) {
          var v = (d.votes && d.votes[p.id]) || '';
          var cls = voteClass(v);
          pills += '<span class="vp ' + cls + '">' + esc(p.displayName) + ': ' + voteLabel(v) + '</span>';
        });
        var my = d.myVote || '';
        var b1 = my === 'available' ? ' on' : '';
        var b2 = my === 'maybe' ? ' on' : '';
        var b3 = my === 'unavailable' ? ' on' : '';
        var ft = d.fullTableOk ? '<span class="badge-ft">Full table</span>' : '';
        var actions = '';
        if (booked) {
          var bk = findConfirmed(d.iso);
          var ktext = bk ? esc(bk.kindLabel || '') : '';
          actions = '<div class="confirmed-booking-hit js-view" data-iso="' + esc(d.iso) + '" role="button" tabindex="0">' +
            '<div class="cb-line1">Confirmed</div>' +
            '<div class="cb-line2">' + ktext + '</div></div>';
        } else {
          actions = '<button type="button" class="btn btn-primary js-book" data-iso="' + esc(d.iso) + '">Book</button>';
        }
        var isToday = APP.todayIso && d.iso === APP.todayIso;
        h += '<div class="day-row' + (isToday ? ' day-is-today' : '') + '" data-iso="' + esc(d.iso) + '">' +
          '<div class="day-date-col">' +
            '<div class="day-week">' + esc(d.dayLabel || '') + '</div>' +
            '<div class="day-date-main"><div class="day-num">' + esc(dayNum) + '</div><div class="day-month">' + esc(dayMonth) + '</div></div>' +
          '</div>' +
          '<div class="day-my-col">' +
          '<div class="my-vote-label">Your vote</div>' +
          '<div class="my-vote">' +
          '<button type="button" class="js-vote vote-yes' + b1 + '" data-iso="' + esc(d.iso) + '" data-v="available">Yes</button>' +
          '<button type="button" class="js-vote vote-maybe' + b2 + '" data-iso="' + esc(d.iso) + '" data-v="maybe">Maybe</button>' +
          '<button type="button" class="js-vote vote-no' + b3 + '" data-iso="' + esc(d.iso) + '" data-v="unavailable">No</button>' +
          '</div></div>' +
          '<div class="day-actions-col">' +
            '<div class="vote-pills-wrap"><div class="vote-pills-label">Party votes</div><div class="vote-pills">' + pills + '</div></div>' +
            '<div class="day-actions-btns">' + ft + actions + '</div>' +
          '</div></div>';
      });
      el.innerHTML = h;
      updateMonthNav();
      el.querySelectorAll('.js-vote').forEach(function(btn) {
        btn.addEventListener('click', function(ev) {
          ev.stopPropagation();
          var iso = btn.getAttribute('data-iso');
          var v = btn.getAttribute('data-v');
          setMyVote(iso, v);
        });
      });
      el.querySelectorAll('.js-book').forEach(function(btn) {
        btn.addEventListener('click', function(ev) {
          ev.stopPropagation();
          openConfirm(btn.getAttribute('data-iso'));
        });
      });
      el.querySelectorAll('.js-view').forEach(function(btn) {
        btn.addEventListener('click', function(ev) {
          ev.stopPropagation();
          openDetail(btn.getAttribute('data-iso'));
        });
        btn.addEventListener('keydown', function(ev) {
          if (ev.key === 'Enter' || ev.key === ' ') {
            ev.preventDefault();
            openDetail(btn.getAttribute('data-iso'));
          }
        });
      });
    }

    function setMyVote(iso, v) {
      var d = findDateEntry(iso);
      if (!d) return;
      d.myVote = v;
      renderDayList();
      queueSave();
    }

    function setSelectedPlayer(playerId) {
      var hidden = document.getElementById('playerSel');
      hidden.value = playerId || '';
      document.querySelectorAll('.player-choice').forEach(function(btn) {
        var active = btn.getAttribute('data-id') === hidden.value;
        if (active) btn.classList.add('on');
        else btn.classList.remove('on');
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    function queueSave() {
      if (APP.saveT) clearTimeout(APP.saveT);
      APP.saveT = setTimeout(saveVotesNow, 450);
    }

    function saveVotesNow() {
      var votes = [];
      (APP.dates || []).forEach(function(d) {
        if (d.myVote) votes.push({ date: d.iso, vote: d.myVote });
      });
      api('saveVotes', { votes: votes }).then(function(r) {
        if (!r.ok) { alert(r.error || 'Save failed'); return; }
        mergeApp(r);
      });
    }

    function mergeApp(r) {
      if (r.dates) APP.dates = r.dates;
      if (r.confirmedGames) APP.confirmedGames = r.confirmedGames;
      if (r.players) APP.players = r.players;
      if (r.fullTableDates) APP.fullTableDates = r.fullTableDates;
      if (r.arcadiaDefaultLocation) APP.arcadiaDefaultLocation = r.arcadiaDefaultLocation;
      if (r.todayIso) APP.todayIso = r.todayIso;
      if (r.me && r.me.displayName) document.getElementById('dispName').textContent = r.me.displayName;
      ensureViewMonth();
      renderConfirmed();
      renderDayList();
      if (!APP.hasScrolledToToday && APP.todayIso) {
        APP.hasScrolledToToday = true;
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            var row = document.querySelector('.day-row[data-iso="' + APP.todayIso + '"]');
            if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
          });
        });
      }
    }

    function loadAppData() {
      APP.initialLoadPending = true;
      renderDayList();
      return api('getAppData', {}).then(function(r) {
        APP.initialLoadPending = false;
        if (!r.ok) { showGate(); return; }
        mergeApp(r);
        if (r.me) document.getElementById('dispName').textContent = r.me.displayName || '';
        loadIcs();
      }).catch(function() {
        APP.initialLoadPending = false;
        showGate();
      });
    }

    function loadIcs() {
      api('getCalendarFeedLinks', { origin: window.location.origin }).then(function(r) {
        var el = document.getElementById('ics-url');
        if (r.ok && r.url) el.textContent = r.url;
        else el.textContent = '(could not load — try again after saving availability)';
      });
    }

    document.getElementById('btnCopyIcs').addEventListener('click', function() {
      var t = document.getElementById('ics-url').textContent;
      if (!t) return;
      navigator.clipboard.writeText(t).then(function() { alert('Copied'); });
    });
    document.getElementById('btnRotateIcs').addEventListener('click', function() {
      if (!confirm('Rotate the calendar link? Old subscriptions will stop updating.')) return;
      api('rotateCalendarFeedToken', { origin: window.location.origin }).then(function(r) {
        if (!r.ok) { alert(r.error || 'Failed'); return; }
        document.getElementById('ics-url').textContent = r.url || '';
        alert('New link ready. Re-subscribe in your calendar app.');
      });
    });

    function shiftMonth(delta) {
      var months = distinctMonths(APP.dates || []);
      var idx = months.indexOf(APP.viewMonth);
      var newIdx = idx + delta;
      if (newIdx < 0 || newIdx >= months.length) return;
      APP.viewMonth = months[newIdx];
      renderDayList();
    }

    document.getElementById('btnMonthPrev').addEventListener('click', function() { shiftMonth(-1); });
    document.getElementById('btnMonthNext').addEventListener('click', function() { shiftMonth(1); });
    document.getElementById('filterMissingVote').addEventListener('change', function() {
      renderDayList();
    });

    function resetBookingEditorState() {
      APP.editBooking = false;
      APP._editSnapshot = null;
      document.getElementById('cfSave').textContent = 'Confirm';
    }

    function openConfirm(iso) {
      resetBookingEditorState();
      APP.pendingIso = iso;
      var d = findDateEntry(iso);
      if (!d) return;
      document.getElementById('confirmTitle').textContent = 'Confirm — ' + d.dayLabel + ', ' + d.label;
      var vs = '';
      (APP.players || []).forEach(function(p) {
        var v = (d.votes && d.votes[p.id]) || '';
        vs += '<div>' + esc(p.displayName) + ': <strong>' + esc(voteLabel(v)) + '</strong></div>';
      });
      document.getElementById('confirmVoteSummary').innerHTML = vs;
      document.getElementById('cfKind').value = 'green_hunger';
      document.getElementById('cfStart').value = '18:30';
      document.getElementById('cfEnd').value = '22:00';
      document.getElementById('cfLoc').value = '';
      document.getElementById('cfErr').style.display = 'none';
      syncKindUi();
      document.getElementById('cfKind').onchange = function() {
        APP._editSnapshot = null;
        syncKindUi();
      };
      document.getElementById('sheet-confirm').classList.add('open');
      document.getElementById('sheet-confirm').setAttribute('aria-hidden', 'false');
    }

    function openBookingEditor(iso) {
      var c = findConfirmed(iso);
      if (!c) return;
      APP.pendingIso = iso;
      APP.editBooking = true;
      APP._editSnapshot = c.kind === 'arcadia'
        ? { arcadiaAttendeeIds: (c.attendees || []).map(function(a) { return a.id; }) }
        : null;
      document.getElementById('confirmTitle').textContent = 'Edit session — ' + c.dayLabel + ', ' + c.label;
      document.getElementById('cfSave').textContent = 'Save changes';
      var d = findDateEntry(iso);
      var vs = '';
      if (d) {
        (APP.players || []).forEach(function(p) {
          var v = (d.votes && d.votes[p.id]) || '';
          vs += '<div>' + esc(p.displayName) + ': <strong>' + esc(voteLabel(v)) + '</strong></div>';
        });
      }
      document.getElementById('confirmVoteSummary').innerHTML = vs;
      document.getElementById('cfKind').value = c.kind;
      document.getElementById('cfStart').value = c.startTime || '18:30';
      document.getElementById('cfEnd').value = c.endTime || '22:00';
      document.getElementById('cfLoc').value = c.location || '';
      document.getElementById('cfErr').style.display = 'none';
      syncKindUi();
      document.getElementById('cfKind').onchange = function() {
        APP._editSnapshot = null;
        syncKindUi();
      };
      document.getElementById('sheet-detail').classList.remove('open');
      document.getElementById('sheet-confirm').classList.add('open');
      document.getElementById('sheet-confirm').setAttribute('aria-hidden', 'false');
    }

    var GH_LOC_DEFAULT = 'Online / home';

    function syncKindUi() {
      var kind = document.getElementById('cfKind').value;
      var loc = document.getElementById('cfLoc');
      var v = loc.value.trim();
      var arc = (APP.arcadiaDefaultLocation || '').trim();
      if (kind === 'arcadia') {
        if (!v || v === GH_LOC_DEFAULT) loc.value = arc;
      } else {
        if (!v || (arc && v === arc)) loc.value = GH_LOC_DEFAULT;
      }
      var att = document.getElementById('cfAtt');
      var html = '';
      var isGh = kind === 'green_hunger';
      var snap = APP._editSnapshot;
      (APP.players || []).forEach(function(p) {
        var d = findDateEntry(APP.pendingIso);
        var vv = d && d.votes ? (d.votes[p.id] || '') : '';
        var dis = isGh ? ' disabled' : '';
        var checked;
        if (isGh) {
          checked = true;
        } else if (snap && snap.arcadiaAttendeeIds) {
          checked = snap.arcadiaAttendeeIds.indexOf(p.id) !== -1;
        } else {
          checked = (vv === 'available' || vv === 'maybe');
        }
        var chkAttr = checked ? ' checked' : '';
        html += '<label style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:0.85rem;">' +
          '<input type="checkbox" class="cf-att-cb" data-id="' + esc(p.id) + '"' + chkAttr + dis + '/> ' +
          esc(p.displayName) +
        '</label>';
      });
      att.innerHTML = html;
    }

    document.getElementById('cfCancel').addEventListener('click', function() {
      resetBookingEditorState();
      document.getElementById('sheet-confirm').classList.remove('open');
    });
    document.getElementById('cfSave').addEventListener('click', function() {
      var iso = APP.pendingIso;
      var kind = document.getElementById('cfKind').value;
      var start = document.getElementById('cfStart').value;
      var end = document.getElementById('cfEnd').value;
      var loc = document.getElementById('cfLoc').value.trim();
      var ids = [];
      document.querySelectorAll('.cf-att-cb').forEach(function(cb) {
        if (cb.checked) ids.push(cb.getAttribute('data-id'));
      });
      var err = document.getElementById('cfErr');
      err.style.display = 'none';
      var warns = collectBookingWarnings(kind, iso, ids);
      if (warns.length) {
        var msg = 'Some players have not voted Yes, or voted Maybe/No, or have no vote:\n\n' + warns.join('\n') +
          '\n\nBook this session anyway?';
        if (!window.confirm(msg)) return;
      }
      var payload = {
        date: iso,
        kind: kind,
        startTime: start,
        endTime: end,
        location: loc,
        attendeePlayerIds: ids
      };
      if (APP.editBooking) payload.replaceExisting = true;
      api('confirmSession', payload).then(function(r) {
        if (!r.ok) {
          err.textContent = r.error || 'Could not confirm';
          err.style.display = 'block';
          return;
        }
        resetBookingEditorState();
        mergeApp(r);
        document.getElementById('sheet-confirm').classList.remove('open');
      });
    });

    var DET_ISO = null;
    function openDetail(iso) {
      DET_ISO = iso;
      var c = findConfirmed(iso);
      if (!c) return;
      document.getElementById('detTitle').textContent = c.kindLabel + ' — ' + c.label;
      var body = (c.sessionTime || '') + '<br/>' + esc(c.location || '(no location)') + '<br/><br/>Players: ';
      body += (c.attendees || []).map(function(a){ return esc(a.displayName); }).join(', ');
      document.getElementById('detBody').innerHTML = body;
      document.getElementById('sheet-detail').classList.add('open');
    }
    document.getElementById('detClose').addEventListener('click', function() {
      document.getElementById('sheet-detail').classList.remove('open');
    });
    document.getElementById('detEdit').addEventListener('click', function() {
      if (DET_ISO) openBookingEditor(DET_ISO);
    });
    document.getElementById('detIcs').addEventListener('click', function() {
      api('getSingleEventCalendarIcs', { date: DET_ISO }).then(function(r) {
        if (!r.ok || !r.ics) { alert(r.error || 'Failed'); return; }
        var blob = new Blob([r.ics], { type: 'text/calendar;charset=utf-8' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'session-' + DET_ISO + '.ics';
        a.click();
        URL.revokeObjectURL(a.href);
      });
    });
    document.getElementById('detUnbook').addEventListener('click', function() {
      if (!confirm('Remove this confirmed session?')) return;
      api('unconfirmSession', { date: DET_ISO }).then(function(r) {
        if (!r.ok) { alert(r.error || 'Failed'); return; }
        mergeApp(r);
        document.getElementById('sheet-detail').classList.remove('open');
      });
    });

    document.getElementById('btnLogin').addEventListener('click', function() {
      var secret = document.getElementById('secret').value;
      var playerId = document.getElementById('playerSel').value;
      var ge = document.getElementById('gateErr');
      ge.style.display = 'none';
      api('login', { groupSecret: secret, playerId: playerId }).then(function(r) {
        if (!r.ok) {
          ge.textContent = r.error || 'Login failed';
          ge.style.display = 'block';
          return;
        }
        loginWonRace = true;
        showApp();
        if (r.me) document.getElementById('dispName').textContent = r.me.displayName || '';
        loadAppData();
      });
    });

    document.getElementById('btnLogout').addEventListener('click', function() {
      APP.viewMonth = '';
      APP.todayIso = '';
      APP.hasScrolledToToday = false;
      api('logout', {}).then(function() { showGate(); });
    });

    function boot() {
      api('authMe', {}).then(function(r) {
        if (r.ok && r.me) {
          loginWonRace = true;
          document.getElementById('dispName').textContent = r.me.displayName || '';
          showApp();
          loadAppData();
        } else if (!loginWonRace) {
          api('getPublicBootstrap', {}).then(function(b) {
            if (loginWonRace) return;
            var picker = document.getElementById('playerPicker');
            if (b.ok && b.players) {
              var sortedPlayers = b.players.slice().sort(function(a, z) {
                return String(a.displayName || '').localeCompare(String(z.displayName || ''), undefined, { sensitivity: 'base' });
              });
              picker.innerHTML = '';
              sortedPlayers.forEach(function(p) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'player-choice';
                btn.textContent = p.displayName;
                btn.setAttribute('data-id', p.id);
                btn.setAttribute('aria-pressed', 'false');
                btn.addEventListener('click', function() {
                  setSelectedPlayer(p.id);
                });
                picker.appendChild(btn);
              });
              setSelectedPlayer(sortedPlayers[0] ? sortedPlayers[0].id : '');
            } else {
              picker.innerHTML = '<span style="font-size:0.85rem;color:var(--text-dim);">No players configured</span>';
              setSelectedPlayer('');
            }
            var sw = document.getElementById('secretWrap');
            var needSecret = !!(b.ok && b.requiresGroupSecret);
            if (needSecret) sw.classList.remove('hidden');
            else sw.classList.add('hidden');
            showGate();
          });
        }
      });
    }

    boot();
  })();
  </script>
</body>
</html>
