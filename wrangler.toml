name                   = "dndapp-lite"
compatibility_date     = "2024-09-23"
pages_build_output_dir = "public"

# D1: must be your real database UUID (not the Miniflare placeholder).
# Error 8000022 on deploy means this value is wrong or still a placeholder.
# Get it: Cloudflare dashboard → Storage → D1 → dndapp-lite-db → Database ID,
# or locally (after wrangler login): npm run db:info
[[d1_databases]]
binding           = "DB"
database_name     = "dndapp-lite-db"
database_id       = "6cf30f37-0255-41d8-9448-10892a471a31"

# Optional: GROUP_SECRET in Pages → Environment variables — if set, gate shows a password field.
